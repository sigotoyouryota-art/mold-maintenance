<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --orange:#EF9F27;--orange-dark:#c97d10;--navy:#080d18;
  --bg1:#080d18;--bg2:#111827;--bg3:#1e2d45;
  --text1:#e8eaf0;--text2:#8b90a0;
  --border:rgba(255,255,255,0.08);
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --eq:#3b82f6;--md:#a855f7;
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --nav-h:56px;
  --factory:#2e3a52; --roof:#3d4e6e;
}
[data-theme="light"]{
  --bg1:#e8e6e2;--bg2:#ffffff;--bg3:#f0ede8;
  --text1:#1a1f2e;--text2:#666666;
  --border:rgba(0,0,0,0.18);--shadow:0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{touch-action:manipulation}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}
.main-column{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ===== Topbar (F-style) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

/* ===== Bottom Nav (2-tab) ===== */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}
@media(min-width:768px){.bottom-nav{display:none}}

/* ===== Sidebar (PC/Tablet) ===== */
.sidebar{display:none}
@media(min-width:768px){
  .app{flex-direction:row}
  .sidebar{
    display:flex;width:220px;flex-shrink:0;
    background:var(--bg2);border-right:1px solid var(--border);
    flex-direction:column;overflow-y:auto;
  }
  .sidebar-logo{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
  .sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sidebar-avatar{width:36px;height:36px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sidebar-name{font-size:13px;font-weight:700}
  .sidebar-role{font-size:11px;color:var(--text2)}
  .sidebar-nav{flex:1;padding:12px 8px}
  .lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
  .lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}
  .snav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;font-family:inherit;width:100%;text-align:left}
  .snav-item:hover{background:var(--bg3);color:var(--text1)}
  .snav-item.active{background:rgba(239,159,39,.12);color:var(--orange);font-weight:700}
  .snav-icon{font-size:18px;width:24px;text-align:center}
  .snav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
  .snav-disabled{opacity:.3;pointer-events:none;cursor:not-allowed}
  .snav-lock{margin-left:auto;font-size:10px;opacity:.6}
  .sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
  .topbar{display:none}
  .role-admin .sidebar-avatar{background:rgba(239,68,68,0.25);color:#f87171}
  .role-sl .sidebar-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
  .role-op .sidebar-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
  [data-theme="light"] .role-admin .sidebar-avatar{background:rgba(239,68,68,0.15);color:#c53030}
  [data-theme="light"] .role-sl .sidebar-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
  [data-theme="light"] .role-op .sidebar-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
}
@media(min-width:1025px){
  .sidebar{width:240px}
}


/* Scroll */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 32px}
.inner{max-width:900px;margin:0 auto}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.period-tabs{display:flex;gap:4px}
.ptab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.ptab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}
.ptab:hover:not(.active){border-color:var(--orange);color:var(--orange)}
.type-tabs{display:flex;gap:4px}
.ttab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.ttab.active.eq{background:rgba(59,130,246,.15);border-color:var(--eq);color:var(--eq)}
.ttab.active.md{background:rgba(168,85,247,.15);border-color:var(--md);color:var(--md)}
.ttab.active.all{background:var(--orange);border-color:var(--orange);color:var(--navy)}
.ttab:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;line-height:1}
.kpi-value.eq{color:var(--eq)}
.kpi-value.md{color:var(--md)}
.kpi-value.stop{color:var(--warning)}

/* Chart grid */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;animation:fadeUp .3s ease both}
.chart-card.wide{grid-column:span 2}
@media(max-width:600px){.chart-card.wide{grid-column:span 1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chart-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;margin-bottom:12px}
.chart-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;height:200px}
.chart-wrap.tall{height:240px}
.chart-wrap.short{height:180px}

/* Ranking list */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{display:flex;align-items:center;gap:8px}
.rank-num{font-size:11px;font-weight:700;color:var(--text2);width:20px;text-align:right;flex-shrink:0}
.rank-num.top{color:var(--orange)}
.rank-bar-wrap{flex:1;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;position:relative}
.rank-bar{height:100%;border-radius:4px;min-width:4px;transition:width .4s ease}
.rank-label{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 40px)}
.rank-count{font-size:11px;font-weight:700;flex-shrink:0;width:28px;text-align:right;color:var(--text2)}

/* Pie legend */
.pie-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px}
.pie-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pie-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Filter rows 2/3 */
.filter-row2,.filter-row3{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.filter-date-wrap{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.filter-date-sep{font-size:11px;color:var(--text2)}
.filter-dateinput{padding:5px 9px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text1);font-family:inherit;cursor:pointer;transition:all .15s;-webkit-appearance:none;appearance:none}
.filter-dateinput:focus{outline:none;border-color:var(--orange)}
.filter-select{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;cursor:pointer;transition:all .15s;-webkit-appearance:none;appearance:none;max-width:160px}
.filter-select:focus{outline:none;border-color:var(--orange)}
.filter-select.has-value{border-color:var(--orange);color:var(--orange)}
.filter-keyword-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:180px}
.filter-keyword{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text1);font-family:inherit;transition:all .15s;flex:1}
.filter-keyword::placeholder{color:var(--text2)}
.filter-keyword:focus{outline:none;border-color:var(--orange)}
.filter-keyword.has-value{border-color:var(--orange)}
.filter-clear-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-clear-btn:hover{border-color:var(--danger);color:var(--danger)}
@media(max-width:600px){
  .filter-date-wrap{width:100%}
  .filter-dateinput{flex:1}
  .filter-select{max-width:100%;width:100%}
  .filter-keyword{width:100%}
}
/* Heatmap */
.hm-grid{display:grid;gap:3px;align-items:center}
.hm-cell{height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;transition:opacity .15s}
.hm-cell:hover{opacity:.8}
.hm-cell.clickable{cursor:pointer}
.rank-item.clickable{cursor:pointer;border-radius:6px;transition:background .12s}
.rank-item.clickable:hover .rank-bar-wrap{opacity:.85}
.rank-item.clickable:hover{background:var(--bg3)}
.hm-cell.clickable:hover{opacity:.85;transform:scale(1.04)}
.hm-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.hm-list-item:hover{border-color:rgba(239,159,39,.3);background:var(--bg2)}
.hm-list-machine{font-size:14px;font-weight:700;color:var(--text1)}
.hm-list-sub{font-size:11px;color:var(--text2);margin-top:2px}
.hm-list-stop{font-size:13px;font-weight:700;color:var(--warning);flex-shrink:0}
.hm-modal-header{font-size:13px;color:var(--text2);margin-bottom:12px}
.hm-modal-count{font-size:12px;font-weight:700;color:var(--orange);margin-left:6px}
.hm-lbl-day{font-size:11px;color:var(--text2);text-align:center}
.hm-lbl-slot{font-size:10px;color:var(--text2);text-align:right;padding-right:6px;white-space:nowrap}
.hm-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.hm-legend-bar{display:flex;gap:3px;align-items:center}
.hm-legend-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.hm-legend-box{width:24px;height:10px;border-radius:2px}
.hm-legend-lbl{font-size:9px;color:var(--text2);white-space:nowrap}
/* Stop TOP10 table */
.stop-top-list{display:flex;flex-direction:column;gap:5px}
.stop-top-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:6px}
.stop-top-num{font-size:11px;font-weight:700;color:var(--text2);width:18px;text-align:right;flex-shrink:0}
.stop-top-num.top{color:var(--orange)}
.stop-top-info{flex:1;min-width:0}
.stop-top-machine{font-size:12px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-top-sub{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-top-min{font-size:13px;font-weight:700;color:var(--warning);flex-shrink:0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeUp .15s ease}
.modal-overlay.center{align-items:center}
.modal-sheet{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:fadeUp .2s ease}
.modal-overlay.center .modal-sheet{border-radius:12px;margin:20px;max-height:80vh}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.detail-row{display:flex;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none;margin-bottom:0}
.detail-key{font-size:11px;font-weight:500;color:var(--text2);width:80px;flex-shrink:0;padding-top:2px}
.detail-val{font-size:13px;flex:1;word-break:break-all}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.status-pending{background:rgba(245,158,11,.15);color:var(--warning)}
.status-approved{background:rgba(16,185,129,.12);color:var(--success)}
.status-rejected{background:rgba(239,68,68,.12);color:var(--danger)}
.status-draft{background:rgba(139,144,160,.12);color:var(--text2)}
.btn-back-modal{width:100%;height:40px;background:none;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:500;color:var(--orange);cursor:pointer;margin-top:12px;transition:all .15s}
.btn-back-modal:hover{background:rgba(239,159,39,.08)}
.btn-close-modal{width:100%;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;margin-top:6px;transition:all .15s}
.btn-close-modal:hover{color:var(--text1)}
.stop-top-item.clickable{cursor:pointer}
.stop-top-item.clickable:hover{background:var(--bg2);border:1px solid rgba(239,159,39,.3)}
/* Loading / empty */
.loading-overlay{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.empty-state{text-align:center;padding:30px;color:var(--text2);font-size:13px}

/* Toast */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:400;white-space:nowrap;animation:fadeUp .2s ease}
.toast.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast.info{background:var(--bg3);border:1px solid var(--border);color:var(--text1)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:767px){.topbar-right .lang-btn{display:none}}
</style>
</head>
<body>
<div class="app">

  <!-- ===== PC/Tablet Sidebar ===== -->
    <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100" height="32" viewBox="0 0 200 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="42" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".4"/>
        <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
        <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>
        <rect x="6" y="16" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="20" y="20" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="34" y="23" width="12" height="4" rx="1" fill="var(--roof)"/>
        <circle cx="12" cy="10" r="3.5" fill="var(--orange)" opacity=".9"/>
        <circle cx="14" cy="5" r="2.5" fill="var(--orange)" opacity=".6"/>
        <circle cx="26" cy="14" r="3" fill="var(--orange)" opacity=".8"/>
        <circle cx="28" cy="9" r="2" fill="var(--orange)" opacity=".5"/>
        <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
        <circle cx="42" cy="13" r="1.8" fill="var(--orange)" opacity=".45"/>
        <text x="60" y="42" font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="var(--orange)">Traq</text>
      </svg>
    </div>
    <div class="sidebar-user" id="sb-user-wrap">
      <div class="sidebar-avatar" id="sb-avatar"></div>
      <div>
        <div class="sidebar-name" id="sb-name"></div>
        <div class="sidebar-role" id="sb-role"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="snav-item" onclick="goHome()">
        <span class="snav-icon">📋</span>
        <span data-i18n="nav_list">一覧</span>
      </button>
      <button class="snav-item active" onclick="void(0)">
        <span class="snav-icon">📊</span>
        <span data-i18n="nav_dashboard">ダッシュボード</span>
      </button>
      <button class="snav-item" onclick="location.href='excel_download.html'">
        <span class="snav-icon">📥</span>
        <span data-i18n="nav_excel">Excelダウンロード</span>
      </button>
      <button class="snav-item" onclick="location.href='admin.html'">
        <span class="snav-icon">🔧</span>
        <span data-i18n="nav_master">マスタ</span>
      </button>

/* ===== UTC→JST変換 ===== */
function utcToJST(isoStr){
  if(!isoStr) return '';
  var s=isoStr.replace('+00:00','Z').replace('+00','Z');
  if(!/Z$/i.test(s)&&!/[+-]\d{2}/.test(s)) s+='Z';
  var d=new Date(s);
  if(isNaN(d.getTime())) return isoStr.slice(0,16).replace('T',' ');
  var jst=new Date(d.getTime()+9*60*60*1000);
  var y=jst.getUTCFullYear(),mo=String(jst.getUTCMonth()+1).padStart(2,'0'),dy=String(jst.getUTCDate()).padStart(2,'0'),h=String(jst.getUTCHours()).padStart(2,'0'),mi=String(jst.getUTCMinutes()).padStart(2,'0');
  return y+'-'+mo+'-'+dy+' '+h+':'+mi;
}
function utcDateToJSTDate(isoStr){
  /* occurred_dateはdate型（"YYYY-MM-DD"）。UTC深夜0時として扱い+9hでJST日付を返す */
  if(!isoStr) return null;
  var s=isoStr.length===10 ? isoStr+'T00:00:00Z' : isoStr;
  var d=new Date(s.replace('+00:00','Z'));
  return new Date(d.getTime()+9*60*60*1000);
}

/* ===== Filter ===== */
function getFiltered(){
  const now=new Date();
  return RAW.filter(r=>{
    // 期間フィルター（直近N日）
    if(currentPeriod>0){
      const d=utcDateToJSTDate(r.occurred_date||r.created_at||'');
      const diff=(now-d)/(1000*60*60*24);
      if(diff>currentPeriod) return false;
    }
    // カスタム日付範囲フィルター（文字列比較: YYYY-MM-DD）
    if(currentPeriod===-1){
      const dateStr=(r.occurred_date||'').slice(0,10);
      if(currentDateFrom && dateStr < currentDateFrom) return false;
      if(currentDateTo   && dateStr > currentDateTo)   return false;
    }
    // 種別フィルター
    if(currentType==='eq'&&r.trouble_type!=='equipment') return false;
    if(currentType==='md'&&r.trouble_type!=='mold') return false;
    // ラインフィルター
    if(currentLine){
      const lineName=r.lines?r.lines.name:'';
      if(lineName!==currentLine) return false;
    }
    // キーワードフィルター（機番・品番・品名）
    if(currentKeyword){
      const kw=currentKeyword.toLowerCase();
      const machNo=(r.machines&&r.machines.machine_no?r.machines.machine_no:'').toLowerCase();
      const pCode=(r.products&&r.products.product_code?r.products.product_code:'').toLowerCase();
      const pName=(r.products&&r.products.product_name?r.products.product_name:'').toLowerCase();
      if(!machNo.includes(kw)&&!pCode.includes(kw)&&!pName.includes(kw)) return false;
    }
    return true;
  });
}

/* ===== Chart helpers ===== */
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function gridColor(){return isDark()?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';}
function tickColor(){return isDark()?'#8b90a0':'#666666';}

/* last N days array */
function lastNDays(n){
  const days=[];
  const nowJST=new Date(Date.now()+9*60*60*1000);
  for(let i=n-1;i>=0;i--){
    const d=new Date(nowJST);d.setUTCDate(d.getUTCDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}
function getDateKey(r){return(r.occurred_date||'').slice(0,10)||null;}

/* ===== Chart 1: 日別件数 ===== */
function renderChart1(data){
  destroyChart('c1');
  const days=currentPeriod>0?lastNDays(currentPeriod):getDayRange(data);
  const labels=days.map(d=>d.slice(5));
  let datasets=[];
  if(currentType==='all'||currentType==='eq'){
    const eqMap={};days.forEach(d=>{eqMap[d]=0;});
    data.filter(r=>r.trouble_type==='equipment').forEach(r=>{const d=getDateKey(r);if(d&&eqMap[d]!==undefined)eqMap[d]++;});
    datasets.push({label:t('t_eq'),data:days.map(d=>eqMap[d]),backgroundColor:'rgba(59,130,246,.7)',borderRadius:3});
  }
  if(currentType==='all'||currentType==='md'){
    const mdMap={};days.forEach(d=>{mdMap[d]=0;});
    data.filter(r=>r.trouble_type==='mold').forEach(r=>{const d=getDateKey(r);if(d&&mdMap[d]!==undefined)mdMap[d]++;});
    datasets.push({label:t('t_md'),data:days.map(d=>mdMap[d]),backgroundColor:'rgba(168,85,247,.7)',borderRadius:3});
  }
  const ctx=document.getElementById('chart1').getContext('2d');
  const chart1opts=Object.assign({},barOpts());
  chart1opts.onClick=function(e){
    const chart=chartInstances['c1'];
    if(!chart) return;
    const els=chart.getElementsAtEventForMode(e,'index',{intersect:false},true);
    if(!els.length) return;
    const idx=els[0].index;
    const dateStr=days[idx];
    if(!dateStr) return;
    const records=data.filter(r=>(r.occurred_date||'').slice(0,10)===dateStr);
    if(!records.length) return;
    openListModal(dateStr.replace(/-/g,'/'), records);
  };
  chart1opts.plugins=Object.assign({},chart1opts.plugins,{tooltip:{mode:'index',intersect:false}});
  chartInstances['c1']=new Chart(ctx,{type:'bar',data:{labels,datasets},options:chart1opts});
}

function renderPieChart(canvasId,legendId,map,srcData,filterFn){
  const keys=Object.keys(map);const vals=keys.map(k=>map[k]);
  const colors=keys.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId).getContext('2d');
  const opts=Object.assign({},pieOpts());
  if(srcData&&filterFn){
    opts.onClick=function(e){
      const chart=chartInstances[canvasId];
      if(!chart) return;
      const els=chart.getElementsAtEventForMode(e,'nearest',{intersect:true},true);
      if(!els.length) return;
      const idx=els[0].index;
      const key=keys[idx];
      if(!key) return;
      const records=srcData.filter(r=>filterFn(r,key));
      openListModal(key, records);
    };
    opts.plugins=Object.assign({},opts.plugins,{
      tooltip:opts.plugins.tooltip
    });
  }
  chartInstances[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{labels:keys,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},
    options:opts
  });
  renderPieLegend(legendId,keys,vals,colors,srcData&&filterFn);
}

function renderPieLegend(id,keys,vals,colors,clickable){
  const el=document.getElementById(id);if(!el)return;
  const total=vals.reduce((s,v)=>s+v,0)||1;
  el.innerHTML=keys.map((k,i)=>
    '<div class="pie-legend-item'+(clickable?' clickable':'')+'" style="'+(clickable?'cursor:pointer':'')+'">'+
      '<div class="pie-legend-dot" style="background:'+colors[i]+'"></div>'+
      '<span>'+k+' '+Math.round(vals[i]/total*100)+'%</span>'+
    '</div>'
  ).join('');
}

/* ===== Ranking ===== */
function renderRank(containerId,data,keyFn,titleFn){
  const el=document.getElementById(containerId);if(!el)return;
  const map={};
  const recordMap={};
  data.forEach(r=>{
    const k=keyFn(r);
    map[k]=(map[k]||0)+1;
    if(!recordMap[k]) recordMap[k]=[];
    recordMap[k].push(r);
  });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!sorted.length){el.innerHTML='<div class="empty-state">'+t('no_data')+'</div>';return;}
  const max=sorted[0][1]||1;
  el.innerHTML='';
  sorted.forEach(([name,cnt],i)=>{
    const item=document.createElement('div');
    item.className='rank-item clickable';
    item.innerHTML=
      '<span class="rank-num '+(i<3?'top':'')+'">'+(i+1)+'</span>'+
      '<div class="rank-bar-wrap">'+
        '<div class="rank-bar" style="width:'+Math.round(cnt/max*100)+'%;background:'+(i===0?'#EF9F27':i===1?'#8b90a0':i===2?'#c97d10':'var(--bg3)')+'"></div>'+
        '<span class="rank-label" style="color:'+(isDark()?'#e8eaf0':'#1a1f2e')+'">'+name+'</span>'+
      '</div>'+
      '<span class="rank-count">'+cnt+'</span>';
    const records=recordMap[name]||[];
    const modalTitle=(titleFn?titleFn(name):name);
    item.addEventListener('click',function(){openListModal(modalTitle,records);});
    el.appendChild(item);
  });
}

/* ===== Utils ===== */
function getDayRange(data){
  if(!data.length) return lastNDays(30);
  const dates=data.map(r=>(r.occurred_date||'').slice(0,10)).filter(Boolean).sort();
  const start=new Date(dates[0]+'T00:00:00Z');const end=new Date(dates[dates.length-1]+'T00:00:00Z');
  const days=[];const cur=new Date(start);
  while(cur<=end){days.push(cur.toISOString().slice(0,10));cur.setUTCDate(cur.getUTCDate()+1);}
  return days;
}

/* ===== Chart 9: 時間帯別ヒートマップ ===== */
function renderHeatmap(data){
  const container=document.getElementById('chart9hm');
  if(!container) return;

  // stop_startを持つレコードのみ対象
  const valid=data.filter(r=>r.stop_start&&r.occurred_date);
  if(!valid.length){
    container.innerHTML='<div class="empty-state">'+t('heatmap_no_data')+'</div>';
    return;
  }

  // 曜日(月〜日)×時間帯スロット の2次元集計
  // 曜日: 0=月...6=日
  const DAY_LABELS=['月','火','水','木','金','土','日'];
  // 時間帯スロット: 8時スタート2時間刻み、24時間分（8→10→...→24→2→4→6→8）
  const SLOTS=['8-10時','10-12時','12-14時','14-16時','16-18時','18-20時','20-22時','22-24時','0-2時','2-4時','4-6時','6-8時'];
  const SLOT_COUNT=12;
  const DAY_COUNT=7;

  // matrix[slot][day] = count、matrixRecords[slot][day] = records[]
  const matrix=Array.from({length:SLOT_COUNT},()=>Array(DAY_COUNT).fill(0));
  const matrixRecords=Array.from({length:SLOT_COUNT},()=>Array.from({length:DAY_COUNT},()=>([])))

  valid.forEach(r=>{
    const h=parseInt((r.stop_start||'').slice(0,2),10);
    if(isNaN(h)) return;
    // スロット判定: 8時スタート2時間刻み12スロット
    // 8→0, 10→1, 12→2, 14→3, 16→4, 18→5, 20→6, 22→7, 0→8, 2→9, 4→10, 6→11
    let si;
    if(h>=8) si=Math.floor((h-8)/2);
    else si=8+Math.floor(h/2); // 0→8, 1→8, 2→9, 3→9, 4→10, 5→10, 6→11, 7→11
    if(si<0||si>=SLOT_COUNT) return;
    // 曜日: occurred_date の曜日（ローカルではなくUTC基準で+9h）
    const d=utcDateToJSTDate(r.occurred_date);
    if(!d) return;
    const dow=d.getDay(); // 0=日...6=土
    const di=dow===0?6:dow-1; // 月=0...日=6
    matrix[si][di]++;
    matrixRecords[si][di].push(r);
  });

  const max=Math.max(...matrix.flat())||1;

  // I-aカラースケール
  function hmColor(v){
    if(v===0) return {bg:isDark()?'#1e2d45':'#f0ede8',fg:isDark()?'#8b90a0':'#999'};
    if(v===1) return {bg:'#C8F5D4',fg:'#0f4f1f'};
    if(v<=3)  return {bg:'#6EE89A',fg:'#0a3d1f'};
    if(v<=5)  return {bg:'#FFE580',fg:'#4d3800'};
    if(v<=7)  return {bg:'#FFB3B3',fg:'#6b0000'};
    return           {bg:'#FF6B6B',fg:'#fff'};
  }

  // DOM構築
  const colW=`repeat(${DAY_COUNT},1fr)`;
  const grid=document.createElement('div');
  grid.className='hm-grid';
  grid.style.gridTemplateColumns='52px '+colW;

  // ヘッダー行（曜日）
  const emptyHdr=document.createElement('div');
  grid.appendChild(emptyHdr);
  DAY_LABELS.forEach(d=>{
    const el=document.createElement('div');
    el.className='hm-cell hm-lbl-day';
    el.textContent=d;
    grid.appendChild(el);
  });

  // データ行
  SLOTS.forEach((slot,si)=>{
    const lbl=document.createElement('div');
    lbl.className='hm-lbl-slot';
    lbl.textContent=slot;
    grid.appendChild(lbl);
    DAY_LABELS.forEach((_,di)=>{
      const v=matrix[si][di];
      const {bg,fg}=hmColor(v);
      const cell=document.createElement('div');
      cell.className='hm-cell'+(v>0?' clickable':'');
      cell.style.background=bg;
      cell.style.color=fg;
      cell.textContent=v>0?v:'';
      cell.title=slot+' '+DAY_LABELS[di]+'曜: '+v+'件';
      if(v>0){
        (function(s,d){
          cell.addEventListener('click',function(){openHeatmapDetail(matrixRecords[s][d],slot,DAY_LABELS[d]);});
        })(si,di);
      }
      grid.appendChild(cell);
    });
  });

  // 凡例
  const legend=document.createElement('div');
  legend.className='hm-legend';
  const legendData=[
    {bg:isDark()?'#1e2d45':'#f0ede8',lbl:'0件'},
    {bg:'#C8F5D4',lbl:'1件'},
    {bg:'#6EE89A',lbl:'2-3件'},
    {bg:'#FFE580',lbl:'4-5件'},
    {bg:'#FFB3B3',lbl:'6-7件'},
    {bg:'#FF6B6B',lbl:'8件+'},
  ];
  const bar=document.createElement('div');
  bar.className='hm-legend-bar';
  legendData.forEach(ld=>{
    const item=document.createElement('div');
    item.className='hm-legend-item';
    const box=document.createElement('div');
    box.className='hm-legend-box';
    box.style.background=ld.bg;
    const lbl=document.createElement('div');
    lbl.className='hm-legend-lbl';
    lbl.textContent=ld.lbl;
    item.appendChild(box);
    item.appendChild(lbl);
    bar.appendChild(item);
  });
  legend.appendChild(bar);

  container.innerHTML='';
  container.appendChild(grid);
  container.appendChild(legend);
}

/* ===== Chart 11: ライン別平均停止時間 ===== */
function renderLineAvgStop(data){
  destroyChart('c11');
  const wrap=document.getElementById('chart11wrap');
  // ラインごとにstop_minutesの平均を計算
  const lineMap={};
  data.forEach(r=>{
    if(!r.stop_minutes) return;
    const ln=r.lines?r.lines.name:'未設定';
    if(!lineMap[ln]) lineMap[ln]={sum:0,cnt:0};
    lineMap[ln].sum+=r.stop_minutes;
    lineMap[ln].cnt++;
  });
  const entries=Object.entries(lineMap)
    .map(([k,v])=>({name:k,avg:Math.round(v.sum/v.cnt)}))
    .sort((a,b)=>b.avg-a.avg)
    .slice(0,10);
  if(!entries.length){
    const cv=document.getElementById('chart11');
    if(cv) cv.closest('.chart-wrap').innerHTML='<div class="empty-state">'+t('no_data')+'</div>';
    return;
  }
  // 高さを動的設定
  if(wrap) wrap.style.height=Math.max(180,entries.length*44+60)+'px';
  const ctx=document.getElementById('chart11').getContext('2d');
  chartInstances['c11']=new Chart(ctx,{
    type:'bar',
    data:{
      labels:entries.map(e=>e.name),
      datasets:[{
        label:t('avg_min'),
        data:entries.map(e=>e.avg),
        backgroundColor:'rgba(245,158,11,.7)',
        borderRadius:4,
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.raw+'分'}}
      },
      scales:{
        x:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:10,family:'Noto Sans JP'}},beginAtZero:true},
        y:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:11,family:'Noto Sans JP'}}}
      }
    }
  });
}

/* ===== Chart 12: シフト別件数 ===== */
function renderShiftChart(data){
  destroyChart('c12');
  const shifts=['1','2','3'];
  const labels=shifts.map(s=>s+'直');
  const ctx=document.getElementById('chart12').getContext('2d');
  if(currentType==='all'){
    // stacked bar: 設備と金型を積み上げ
    const eqData=shifts.map(s=>data.filter(r=>r.trouble_type==='equipment'&&String(r.shift)===s).length);
    const mdData=shifts.map(s=>data.filter(r=>r.trouble_type==='mold'&&String(r.shift)===s).length);
    chartInstances['c12']=new Chart(ctx,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:t('t_eq'),data:eqData,backgroundColor:'rgba(59,130,246,.7)',borderRadius:3,stack:'s'},
          {label:t('t_md'),data:mdData,backgroundColor:'rgba(168,85,247,.7)',borderRadius:3,stack:'s'},
        ]
      },
      options:{...barOpts(),scales:{...barOpts().scales,x:{...barOpts().scales.x,stacked:true},y:{...barOpts().scales.y,stacked:true}}}
    });
  } else {
    const col=currentType==='eq'?'rgba(59,130,246,.7)':'rgba(168,85,247,.7)';
    const counts=shifts.map(s=>data.filter(r=>String(r.shift)===s).length);
    chartInstances['c12']=new Chart(ctx,{
      type:'bar',
      data:{labels,datasets:[{label:t(currentType==='eq'?'t_eq':'t_md'),data:counts,backgroundColor:col,borderRadius:4}]},
      options:barOpts()
    });
  }
}

/* ===== 共通 一覧モーダル ===== */
function buildListItem(r, listTitle, listRecords){
  const line=r.lines?r.lines.name:'–';
  const machine=r.machines?r.machines.machine_no+'号機':'–';
  const pCode=r.products?r.products.product_code:'–';
  const date=(r.occurred_date||'').slice(0,10).replace(/-/g,'/');
  const stopStr=r.stop_minutes?r.stop_minutes+'分':'–';
  const typeColor=r.trouble_type==='equipment'?'#3b82f6':'#a855f7';
  const typeLabel=r.trouble_type==='equipment'?t('t_eq'):t('t_md');
  const item=document.createElement('div');
  item.className='hm-list-item';
  item.innerHTML=
    '<div style="flex:1;min-width:0">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
        '<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:'+(r.trouble_type==='equipment'?'rgba(59,130,246,.15)':'rgba(168,85,247,.15)')+';color:'+typeColor+'">'+typeLabel+'</span>'+
        '<span class="hm-list-machine">'+line+' '+machine+'</span>'+
      '</div>'+
      '<div class="hm-list-sub">'+pCode+' &nbsp;'+date+'</div>'+
    '</div>'+
    '<span class="hm-list-stop">'+stopStr+'</span>';
  item.addEventListener('click',function(){openTroubleDetail(r.id, listTitle, listRecords);});
  return item;
}
function openListModal(title, records){
  const el=document.getElementById('dashModalEl');
  if(!el) return;
  const sorted=[...records].sort((a,b)=>(b.stop_minutes||0)-(a.stop_minutes||0));

  // DOM生成
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeDashModal();});

  const sheet=document.createElement('div');
  sheet.className='modal-sheet';

  const handle=document.createElement('div');handle.className='modal-handle';
  const titleEl=document.createElement('div');titleEl.className='modal-title';
  titleEl.innerHTML=title+'<span class="hm-modal-count">'+records.length+'件</span>';
  const subEl=document.createElement('div');subEl.className='hm-modal-header';subEl.textContent='タップで詳細を表示';
  const listWrap=document.createElement('div');listWrap.style.cssText='display:flex;flex-direction:column;gap:6px';
  sorted.forEach(r=>listWrap.appendChild(buildListItem(r, title, records)));
  const closeBtn=document.createElement('button');
  closeBtn.className='btn-close-modal';
  closeBtn.textContent='閉じる';
  closeBtn.addEventListener('click',closeDashModal);

  sheet.appendChild(handle);
  sheet.appendChild(titleEl);
  sheet.appendChild(subEl);
  sheet.appendChild(listWrap);
  sheet.appendChild(closeBtn);
  overlay.appendChild(sheet);
  el.innerHTML='';
  el.appendChild(overlay);
  el.style.display='block';
}

/* ===== Heatmap Cell Detail Modal ===== */
function openHeatmapDetail(records, slot, dayLabel){
  openListModal(slot+' '+dayLabel+'曜日', records);
}

/* ===== Trouble Detail Modal ===== */
function openTroubleDetail(id, backTitle, backRecords){
  const r=RAW.find(x=>x.id===id);
  if(!r) return;
  const typeLabel=r.trouble_type==='equipment'?t('t_eq'):t('t_md');
  const typeClass=r.trouble_type==='equipment'?'eq':'md';
  const typeColor=r.trouble_type==='equipment'?'var(--eq)':'var(--md)';
  const statusMap={pending:'承認待ち',approved:'承認済み',rejected:'差し戻し',draft:'下書き'};
  const statusLabel=t('status_'+r.status)||(statusMap[r.status]||r.status);
  const occLabel=r.occurrence==='first'?t('first'):(r.occurrence==='recurrence'||r.occurrence==='repeat')?t('rec'):r.occurrence||'–';
  const line=r.lines?r.lines.name:'–';
  const machine=r.machines?r.machines.machine_no+'号機':'–';
  const pCode=r.products?r.products.product_code:'–';
  const pName=r.products?r.products.product_name:'';
  const category=r.categories?r.categories.name:'–';
  const reporter=r.traq_users?r.traq_users.name:'–';
  const approver=r.approver?r.approver.name:null;
  const shift=r.shift?r.shift+'直':'–';
  const date=(r.occurred_date||'').slice(0,10).replace(/-/g,'/');
  // 停止時間表示
  const stopStart=r.stop_start?r.stop_start.slice(0,5):null;
  const stopEnd=r.stop_end?r.stop_end.slice(0,5):null;
  let stopHTML;
  if(stopStart||stopEnd){
    stopHTML='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    if(r.stop_minutes) stopHTML+='<span style="font-size:13px;font-weight:500">'+r.stop_minutes+'分</span><span style="font-size:11px;color:var(--text2);margin:0 2px">|</span>';
    stopHTML+='<span style="font-size:12px;padding:2px 8px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border)">'+(stopStart||'–')+'</span>';
    stopHTML+='<span style="font-size:12px;color:var(--text2)">→</span>';
    stopHTML+='<span style="font-size:12px;padding:2px 8px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border)">'+(stopEnd||'--:--')+'</span>';
    stopHTML+='</div>';
  } else {
    stopHTML='<span>'+(r.stop_minutes?r.stop_minutes+'分':'–')+'</span>';
  }
  const approverRow=approver?'<div class="detail-row"><span class="detail-key">承認者</span><span class="detail-val">'+approver+'</span></div>':'';
  const html=
    '<div class="modal-handle"></div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
      '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:'+(r.trouble_type==='equipment'?'rgba(59,130,246,.15)':'rgba(168,85,247,.15)')+';color:'+typeColor+'">'+typeLabel+'</span>'+
      '<span class="modal-title" style="margin:0">トラブル詳細</span>'+
    '</div>'+
    '<div class="modal-sub">No.'+r.id+'</div>'+
    '<div class="detail-row"><span class="detail-key">ステータス</span><span class="detail-val"><span class="status-badge status-'+r.status+'">'+statusLabel+'</span></span></div>'+
    '<div class="detail-row"><span class="detail-key">日付</span><span class="detail-val">'+date+' '+shift+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">ライン</span><span class="detail-val">'+line+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">機番</span><span class="detail-val">'+machine+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">品番</span><span class="detail-val">'+pCode+(pName?' / '+pName:'')+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">停止時間</span><span class="detail-val">'+stopHTML+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">分類</span><span class="detail-val">'+category+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">初発/再発</span><span class="detail-val">'+occLabel+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">詳細</span><span class="detail-val">'+(r.detail||'–')+'</span></div>'+
    '<div class="detail-row"><span class="detail-key">入力者</span><span class="detail-val">'+reporter+'</span></div>'+
    approverRow+
    (backTitle&&backRecords?'<button class="btn-back-modal" onclick="_dashBack()">← 一覧に戻る</button>':'')+
    '<button class="btn-close-modal" onclick="closeDashModal()">閉じる</button>';
  _dashBackTitle=backTitle||null;
  _dashBackRecords=backRecords||null;
  const el=document.getElementById('dashModalEl');
  el.innerHTML='<div class="modal-overlay" onclick="handleDashOverlay(event)"><div class="modal-sheet">'+html+'</div></div>';
  el.style.display='block';
}
function closeDashModal(){document.getElementById('dashModalEl').style.display='none';_dashBackTitle=null;_dashBackRecords=null;}
function handleDashOverlay(e){if(e.target.classList.contains('modal-overlay')){if(_dashBackTitle&&_dashBackRecords){_dashBack();}else{closeDashModal();}}}
var _dashBackTitle=null, _dashBackRecords=null;
function _dashBack(){if(_dashBackTitle&&_dashBackRecords){openListModal(_dashBackTitle,_dashBackRecords);}}

/* ===== Chart 13: 停止時間TOP10 ===== */
function renderStopTop10(data){
  const el=document.getElementById('stopTop10');
  if(!el) return;
  const valid=data.filter(r=>r.stop_minutes>0)
    .sort((a,b)=>b.stop_minutes-a.stop_minutes)
    .slice(0,10);
  if(!valid.length){el.innerHTML='<div class="empty-state">'+t('no_data')+'</div>';return;}
  el.innerHTML='';
  valid.forEach((r,i)=>{
    const machine=r.machines?r.machines.machine_no+'号機':'–';
    const product=r.products?r.products.product_code:'–';
    const line=r.lines?r.lines.name:'–';
    const date=(r.occurred_date||'').slice(0,10).replace(/-/g,'/');
    const item=document.createElement('div');
    item.className='stop-top-item clickable';
    item.innerHTML=
      '<span class="stop-top-num '+(i<3?'top':'')+'">'+(i+1)+'</span>'+
      '<div class="stop-top-info">'+
        '<div class="stop-top-machine">'+line+' '+machine+'</div>'+
        '<div class="stop-top-sub">'+product+' &nbsp;'+date+'</div>'+
      '</div>'+
      '<span class="stop-top-min">'+r.stop_minutes+'分</span>';
    item.addEventListener('click',function(){openTroubleDetail(r.id);});
    el.appendChild(item);
  });
}

/* ===== Toast ===== */
let toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('toastEl');
  el.innerHTML=`<div class="toast ${type}">${msg}</div>`;
  el.style.display='block';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},2500);
}
